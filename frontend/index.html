<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CS2 Demo Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #080c0f;
      --surface:  #0d1317;
      --border:   #1e3040;
      --accent:   #00e5ff;
      --accent2:  #ff6b35;
      --green:    #39ff14;
      --muted:    #4a6070;
      --text:     #c8dde8;
      --danger:   #ff2d55;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline effect */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 48px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border: 2px solid var(--accent);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      font-size: 18px;
      box-shadow: 0 0 12px rgba(0,229,255,0.3), inset 0 0 12px rgba(0,229,255,0.05);
      animation: logoPulse 3s ease-in-out infinite;

      img{
        width: 44px;
        height: 44px;
        border-radius: 25%;
      }
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(0,229,255,0.3), inset 0 0 12px rgba(0,229,255,0.05); }
      50% { box-shadow: 0 0 24px rgba(0,229,255,0.6), inset 0 0 16px rgba(0,229,255,0.1); }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }

    h1 span { color: var(--accent); }

    .header-tag {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* ── Upload Zone ── */
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 64px 40px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: rgba(0,229,255,0.01);
      position: relative;
      overflow: hidden;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: var(--accent);
      background: rgba(0,229,255,0.04);
    }

    .upload-zone.drag-over::after {
      content: 'DROP TO ANALYZE';
      position: absolute;
      inset: 0;
      background: rgba(0,229,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 24px;
      color: var(--accent);
      letter-spacing: 4px;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .upload-zone h2 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 8px;
    }

    .upload-zone p {
      color: var(--muted);
      font-size: 14px;
      font-family: 'Share Tech Mono', monospace;
    }

    input[type="file"] { display: none; }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 28px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,229,255,0.4);
    }

    /* ── Job Progress ── */
    #jobs-section { margin-top: 40px; }

    .section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    .job-card.done { border-color: rgba(57,255,20,0.3); }
    .job-card.error { border-color: rgba(255,45,85,0.3); }

    .job-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .job-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .status-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 3px 10px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .status-badge.pending    { background: rgba(74,96,112,0.3); color: var(--muted); }
    .status-badge.processing { background: rgba(0,229,255,0.1); color: var(--accent); }
    .status-badge.done       { background: rgba(57,255,20,0.1); color: var(--green); }
    .status-badge.error      { background: rgba(255,45,85,0.1); color: var(--danger); }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 2px;
      transition: width 0.3s ease;
      box-shadow: 0 0 8px rgba(0,229,255,0.5);
    }

    .view-results-btn {
      margin-top: 12px;
      font-size: 13px;
      padding: 6px 20px;
    }

    /* ── Results Panel ── */
    #results-section { margin-top: 40px; display: none; }

    .result-header {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px 20px;
    }

    .stat-box-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .stat-box-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    /* ── Player Cards ── */
    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .player-card-header {
      padding: 14px 18px;
      background: rgba(0,229,255,0.04);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .player-name {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }

    .player-team {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 2px;
    }

    .player-team.CT { background: rgba(0,140,255,0.2); color: #4db8ff; }
    .player-team.T  { background: rgba(255,170,0,0.2); color: #ffcc44; }

    .player-stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }

    .mini-stat {
      background: var(--surface);
      padding: 12px 14px;
      text-align: center;
    }

    .mini-stat-val {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .mini-stat-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--muted);
      margin-top: 2px;
      text-transform: uppercase;
    }

    .hit-bars { padding: 14px 18px; border-top: 1px solid var(--border); }

    .hit-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .hit-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 8px;
    }

    .hit-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--accent2);
    }

    .hit-bar-fill.head { background: var(--danger); }

    .insights { padding: 12px 18px; border-top: 1px solid var(--border); }

    .insight-item {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 13px;
      line-height: 1.4;
    }

    .insight-item.tip      { background: rgba(0,229,255,0.06); border-left: 2px solid var(--accent); }
    .insight-item.warning  { background: rgba(255,107,53,0.08); border-left: 2px solid var(--accent2); }
    .insight-item.critical { background: rgba(255,45,85,0.08);  border-left: 2px solid var(--danger); }

    .insight-cat {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      opacity: 0.7;
      margin-bottom: 2px;
      text-transform: uppercase;
    }

    /* ── Round Log ── */
    .round-log { margin-top: 28px; }

    .round-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
    }

    .round-table th {
      text-align: left;
      color: var(--muted);
      letter-spacing: 2px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }

    .round-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(30,48,64,0.5);
    }

    #kill-log{

    }

    .round-table tr:hover td { background: rgba(0,229,255,0.02); }

    .winner-ct { color: #4db8ff; }
    .winner-t  { color: #ffcc44; }

    /* ── Log terminal ── */
    #log {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      height: 100px;
      overflow-y: auto;
      margin-top: 40px;
    }

    #log p { margin-bottom: 2px; }
    #log p.ok    { color: var(--green); }
    #log p.info  { color: var(--accent); }
    #log p.err   { color: var(--danger); }

    /* Animations */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate-in { animation: fadeSlideIn 0.3s ease forwards; }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="logo"><img alt="🌐" src = "https://cdn3.emoji.gg/emojis/70385-csgo.png"/></div>
      <h1>CS2 <span>Demo</span> Analyzer</h1>
      <span class="header-tag">v0.1.0 // GOLANG PIPELINE</span>
    </header>

    <!-- Upload -->
    <div class="upload-zone" id="dropZone">
      <div class="upload-icon">◈</div>
      <h2>Drop Demo File</h2>
      <p>Drag a .dem file here or click to browse</p>
      <button class="btn" onclick="document.getElementById('fileInput').click()">Select .dem file</button>
      <input type="file" id="fileInput" accept=".dem" />
    </div>

    <!-- Jobs -->
    <div id="jobs-section">
      <div class="section-title">Active Jobs</div>
      <div id="jobs-list"></div>
    </div>

    <!-- Results -->
    <div id="results-section">
      <div class="section-title">Analysis Results</div>

      <div class="result-header">
        <div class="stat-box">
          <div class="stat-box-label">Map</div>
          <div class="stat-box-value" id="res-map" style="font-size:20px">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Total Rounds</div>
          <div class="stat-box-value" id="res-rounds">—</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-label">Duration</div>
          <div class="stat-box-value" id="res-duration">—</div>
        </div>
      </div>

      <div class="section-title">Players</div>
      <div class="player-grid" id="player-grid"></div>

      <div class="round-log">
        <div class="section-title">Round Log</div>
        <table class="round-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Winner</th>
              <th>Reason</th>
              <th>Duration</th>
              <th>Kill Log</th>
            </tr>
          </thead>
          <tbody id="round-table-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Terminal log -->
    <div id="log"><p class="info">> system ready. waiting for demo file...</p></div>
  </main>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const jobs = {}; // jobID → { ws, card, progress }

    // ── Log terminal ─────────────────────────────────────────────────────────
    const logEl = document.getElementById('log');
    function log(msg, type = '') {
      const p = document.createElement('p');
      if (type) p.className = type;
      p.textContent = '> ' + msg;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // ── Upload ───────────────────────────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) uploadFile(fileInput.files[0]);
      fileInput.value = '';
    });

    async function uploadFile(file) {
      if (!file.name.endsWith('.dem')) {
        log('error: only .dem files accepted', 'err');
        return;
      }

      log(`uploading ${file.name} (${(file.size / 1024 / 1024).toFixed(1)} MB)...`, 'info');

      const form = new FormData();
      form.append('demo', file);

      try {
        const res = await fetch('/upload', { method: 'POST', body: form });
        const data = await res.json();

        if (!res.ok) {
          log('upload error: ' + (data.error || res.statusText), 'err');
          return;
        }

        log(`job created: ${data.job_id}`, 'ok');
        createJobCard(data.job_id);
        connectWebSocket(data.job_id);
      } catch (err) {
        log('network error: ' + err.message, 'err');
      }
    }

    // ── Job Cards ────────────────────────────────────────────────────────────
    function createJobCard(jobID) {
      document.getElementById('jobs-section').style.display = 'block';

      const card = document.createElement('div');
      card.className = 'job-card animate-in';
      card.id = 'job-' + jobID;
      card.innerHTML = `
        <div class="job-header">
          <span class="job-id">${jobID}</span>
          <span class="status-badge pending" id="badge-${jobID}">PENDING</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="fill-${jobID}" style="width:0%"></div>
        </div>
      `;

      document.getElementById('jobs-list').prepend(card);
      jobs[jobID] = { card };
    }

    function updateJobCard(jobID, status, progress) {
      const badge = document.getElementById('badge-' + jobID);
      const fill  = document.getElementById('fill-' + jobID);
      const card  = document.getElementById('job-' + jobID);

      if (badge) { badge.className = `status-badge ${status}`; badge.textContent = status.toUpperCase(); }
      if (fill)  { fill.style.width = progress + '%'; }
      if (card)  { card.className = `job-card ${status}`; }

      if (status === 'done') {
        // Add a "View Results" button
        if (!document.getElementById('view-' + jobID)) {
          const btn = document.createElement('button');
          btn.className = 'btn view-results-btn';
          btn.id = 'view-' + jobID;
          btn.textContent = 'VIEW RESULTS';
          btn.onclick = () => loadResults(jobID);
          card.appendChild(btn);
        }
      }
    }

    // ── WebSocket ────────────────────────────────────────────────────────────
    function connectWebSocket(jobID) {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws?job_id=${jobID}`);

      ws.onopen    = ()  => log(`ws connected for ${jobID.slice(0,8)}...`, 'info');
      ws.onclose   = ()  => log(`ws closed for ${jobID.slice(0,8)}`, '');
      ws.onerror   = (e) => log(`ws error: ${e}`, 'err');

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          updateJobCard(jobID, msg.status, msg.progress);
          log(`[${jobID.slice(0,8)}] ${msg.status} ${msg.progress}%`);

          if (msg.status === 'done') {
            ws.close();
            loadResults(jobID);
          }
        } catch (_) {}
      };

      jobs[jobID].ws = ws;
    }

    // ── Results ──────────────────────────────────────────────────────────────
    async function loadResults(jobID) {
      log(`fetching results for ${jobID.slice(0,8)}...`, 'info');

      try {
        const res = await fetch(`/jobs/${jobID}/result`);
        const data = await res.json();

        if (!res.ok) {
          log('result error: ' + (data.error || 'unknown'), 'err');
          return;
        }

        renderResults(data);
      } catch (err) {
        log('failed to load results: ' + err.message, 'err');
      }
    }

    function renderResults(data) {
      document.getElementById('results-section').style.display = 'block';
      document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });

      document.getElementById('res-map').textContent     = data.map_name || 'Unknown';
      document.getElementById('res-rounds').textContent  = data.total_rounds;
      document.getElementById('res-duration').textContent = formatDuration(data.duration_seconds);

      // Players
      const grid = document.getElementById('player-grid');
      grid.innerHTML = '';

      Object.values(data.players || {}).forEach(player => {
        grid.appendChild(buildPlayerCard(player));
      });

      // Round log
      const tbody = document.getElementById('round-table-body');
      tbody.innerHTML = '';

      (data.round_log || []).forEach(round => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${round.round}</td>
          <td class="winner-${round.winner}">${round.winner}</td>
          <td>${round.reason}</td>
          <td>${round.duration_seconds?.toFixed(1)}s</td>
          <td class="kill-log">${round.kill_log}</td>
        `;
        tbody.appendChild(tr);
      });

      log('results rendered ✓', 'ok');
    }

    function buildPlayerCard(player) {
      const card = document.createElement('div');
      card.className = 'player-card animate-in';

      const acc = player.shots_fired > 0
        ? ((player.shots_hit / player.shots_fired) * 100).toFixed(1)
        : '0.0';

      const hsRate = player.kills > 0
        ? ((player.headshot_kills / player.kills) * 100).toFixed(0)
        : '0';

      const kd = player.deaths > 0
        ? (player.kills / player.deaths).toFixed(2)
        : player.kills.toFixed(2);

      // Hit location bars
      const hitLocs = player.hit_locations || {};
      const totalHits = Object.values(hitLocs).reduce((a, b) => a + b, 0) || 1;
      const hitBarsHtml = Object.entries(hitLocs)
        .sort(([,a],[,b]) => b - a)
        .slice(0, 4)
        .map(([loc, count]) => {
          const pct = ((count / totalHits) * 100).toFixed(0);
          return `
            <div class="hit-bar-label"><span>${loc}</span><span>${pct}%</span></div>
            <div class="hit-bar-track">
              <div class="hit-bar-fill ${loc === 'Head' ? 'head' : ''}" style="width:${pct}%"></div>
            </div>`;
        }).join('');

      // Insights
      const insightsHtml = (player.insights || []).map(ins => `
        <div class="insight-item ${ins.severity}">
          <div class="insight-cat">${ins.category}</div>
          ${ins.message}
        </div>`).join('');

      card.innerHTML = `
        <div class="player-card-header">
          <span class="player-name">${escHtml(player.name || 'Unknown')}</span>
          <span class="player-team ${player.team}">${player.team || '?'}</span>
        </div>
        <div class="player-stats-grid">
          <div class="mini-stat">
            <div class="mini-stat-val">${player.kills}/${player.deaths}</div>
            <div class="mini-stat-label">K / D</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val">${acc}%</div>
            <div class="mini-stat-label">Accuracy</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val">${hsRate}%</div>
            <div class="mini-stat-label">HS Rate</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val">${player.grenades_thrown + player.flashes_thrown + player.smokes_thrown}</div>
            <div class="mini-stat-label">Util Used</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val">$${player.total_money_spent?.toLocaleString()}</div>
            <div class="mini-stat-label">Money Spent</div>
          </div>
          <div class="mini-stat">
            <div class="mini-stat-val">${kd}</div>
            <div class="mini-stat-label">KD Ratio</div>
          </div>
        </div>
        ${hitLocs && Object.keys(hitLocs).length ? `<div class="hit-bars">${hitBarsHtml}</div>` : ''}
        ${insightsHtml ? `<div class="insights">${insightsHtml}</div>` : ''}
      `;

      return card;
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    function formatDuration(secs) {
      const m = Math.floor(secs / 60);
      const s = Math.floor(secs % 60);
      return `${m}m ${s}s`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
